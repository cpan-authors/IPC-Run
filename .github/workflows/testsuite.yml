name: testsuite

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  ubuntu:
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5
      - name: perl -V
        run: perl -V
        timeout-minutes: 5
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        timeout-minutes: 5
        with:
          cpanfile: "cpanfile"
          args: "--configure-timeout=600 --with-recommends --with-suggests"
      - name: Makefile.PL
        run: perl Makefile.PL
        timeout-minutes: 5
      - name: make test
        run: make test
        timeout-minutes: 5

  disttest:
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5
      - name: perl -V
        run: perl -V
        timeout-minutes: 5
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        timeout-minutes: 5
        with:
          cpanfile: "cpanfile"
          args: "--configure-timeout=600 --with-recommends --with-suggests"
      - name: Makefile.PL
        run: perl Makefile.PL
        timeout-minutes: 5
      - name: make disttest
        run: make disttest
        timeout-minutes: 5

  xt:
    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    runs-on: ubuntu-latest

    container:
      image: perldocker/perl-tester:latest

    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5
      - name: perl -V
        run: perl -V
        timeout-minutes: 5
      - name: Install Dependencies
        run: cpm install --with-develop -g --show-build-log-on-failure
        timeout-minutes: 5
      - name: Makefile.PL
        run: |
          perl Makefile.PL
          mv MYMETA.json META.json
          mv MYMETA.yml META.yml
        timeout-minutes: 5
      - name: extended tests
        run: prove -lb xt/*.t
        timeout-minutes: 5

  perl-versions:
    runs-on: ubuntu-latest
    needs: [ubuntu, disttest]
    name: List Perl versions
    outputs:
      perl-versions: ${{ steps.action.outputs.perl-versions }}
    steps:
      - id: action
        uses: perl-actions/perl-versions@v1
        timeout-minutes: 5
        with:
          since-perl: 5.8
          with-devel: true

  linux:
    name: "Perl ${{ matrix.perl-version }}"
    needs: [perl-versions]
    runs-on: ubuntu-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 0
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    strategy:
      fail-fast: false
      matrix:
        perl-version: ${{ fromJson(needs.perl-versions.outputs.perl-versions) }}

    container:
      image: perldocker/perl-tester:${{ matrix.perl-version }}

    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5
      - name: perl -V
        run: perl -V
        timeout-minutes: 5
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        timeout-minutes: 5
        with:
          cpanfile: "cpanfile"
          args: "--configure-timeout=600 --with-recommends --with-suggests"
          sudo: false
      - run: perl Makefile.PL
        timeout-minutes: 5
      - run: make
        timeout-minutes: 5
      - run: make test
        timeout-minutes: 5

  macOS:
    needs: [ubuntu, linux]
    runs-on: macos-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 0

    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5
      - name: Set up Perl
        run: brew install perl
        timeout-minutes: 5
      - name: perl -V
        run: perl -V
        timeout-minutes: 5
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        timeout-minutes: 5
        with:
          cpanfile: "cpanfile"
          args: "--configure-timeout=600 --with-recommends --with-suggests"
          sudo: false
      - run: perl Makefile.PL
        timeout-minutes: 5
      - run: make
        timeout-minutes: 5
      - run: make test
        timeout-minutes: 5

  windows:
    needs: [ubuntu, linux]
    runs-on: windows-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 0
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 0

    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5
      - name: Set up Perl
        timeout-minutes: 5
        run: |
          choco install strawberryperl
          echo @"
          C:\strawberry\c\bin
          C:\strawberry\perl\site\bin
          C:\strawberry\perl\bin
          "@ |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: perl -V
        run: perl -V
        timeout-minutes: 5
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        timeout-minutes: 5
        with:
          cpanfile: "cpanfile"
          args: "--configure-timeout=600 --with-recommends --with-suggests"
          sudo: false
      - name: Makefile.PL
        run: perl Makefile.PL
        timeout-minutes: 5
      - name: make
        run: make
        timeout-minutes: 5
      - name: make test
        run: make test
        timeout-minutes: 5

  coverage:
    needs: [ubuntu]
    runs-on: ubuntu-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTOMATED_TESTING: 1

    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5
      - name: perl -V
        run: perl -V
        timeout-minutes: 5
      - name: Install Dependencies
        uses: perl-actions/install-with-cpm@v1
        timeout-minutes: 5
        with:
          cpanfile: "cpanfile"
          args: "--configure-timeout=600 --with-recommends --with-suggests"
      - name: Install coverage dependencies
        uses: perl-actions/install-with-cpm@v1
        timeout-minutes: 5
        with:
          install: "Devel::Cover Devel::Cover::Report::Codecov JSON::MaybeXS"
      - name: Makefile.PL
        run: perl Makefile.PL
        timeout-minutes: 5
      - name: Run tests with Devel::Cover
        run: |
          HARNESS_PERL_SWITCHES="-MDevel::Cover=-coverage,statement,branch,condition,subroutine,+ignore,^t/" \
            make test
        timeout-minutes: 10
      - name: Generate coverage report
        run: |
          cover -report text
          cover -report json
        timeout-minutes: 5
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cover_db/cover.json
          flags: perl
          name: perl-coverage
        continue-on-error: true

