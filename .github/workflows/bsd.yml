name: BSDs

on:
  workflow_run:
    workflows: [testsuite]
    types:
      - completed
  workflow_dispatch:

permissions: {}

jobs:
  BSDs:
    # Only run if the testsuite workflow succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        os:
          - name: freebsd
            version: '14.2'
            pkginstall: pkg install -y p5-ExtUtils-MakeMaker

          - name: openbsd
            version: '7.6'
            pkginstall: echo no packages required

          - name: netbsd
            version: '10.1'
            pkginstall: pkgin -y install perl || true
    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 5
        with:
          submodules: recursive

      - name: Test on ${{ matrix.os.name }}
        uses: cross-platform-actions/action@v0.32.0
        timeout-minutes: 15
        with:
          operating_system: ${{ matrix.os.name }}
          version: ${{ matrix.os.version }}
          shell: bash
          run: |
            sudo ${{ matrix.os.pkginstall }}
            /usr/sbin/pkg_info || true
            curl -L https://cpanmin.us | sudo perl - --notest --installdeps --with-configure --with-develop .
            perl Makefile.PL
            make
            prove -wlvmb t
